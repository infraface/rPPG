<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper archive — rPPG Hub</title>
<link rel="icon" href="https://github.com/infraface/infraface.github.io/blob/main/asset/profile.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--bg:#FAFAF7;--bg2:#F0EFE9;--bg3:#E6E5DF;--fg:#1C1C1A;--fg2:#6B6A65;--fg3:#9E9D97;--border:#D8D7D1;--accent:#2563EB;--accent-bg:#EFF6FF;--accent2:#0D9488;--accent3:#D97706;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){:root{--bg:#141413;--bg2:#1E1E1C;--bg3:#2A2A27;--fg:#EEEEE8;--fg2:#A3A29C;--fg3:#6B6A65;--border:#3A3A36;--accent:#60A5FA;--accent-bg:#1E293B;--accent2:#2DD4BF;--accent3:#FBBF24;--shadow:0 1px 3px rgba(0,0,0,.3)}}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font-body);background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
.page{max-width:1280px;margin:0 auto;padding:0 2rem}
.nav{padding:18px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.nav-brand{display:flex;align-items:center;gap:10px}.nav-logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}.nav-logo svg{width:18px;height:18px}.nav-title{font-weight:600;font-size:16px;letter-spacing:-.3px}.nav-links{display:flex;gap:6px}.nav-link{font-size:13px;padding:6px 14px;border-radius:20px;color:var(--fg2);transition:all .2s}.nav-link:hover{background:var(--bg2);color:var(--fg)}.nav-link.active{background:var(--fg);color:var(--bg)}
.page-header{padding:28px 0 20px;border-bottom:1px solid var(--border)}
.page-header h1{font-size:24px;font-weight:600;letter-spacing:-.5px;margin-bottom:4px}
.page-header p{font-size:14px;color:var(--fg2)}
.content{padding:24px 0 48px}

/* Week index — timeline style */
.week-list{display:flex;flex-direction:column;gap:0}
.week-row{display:flex;align-items:center;gap:16px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.week-row:hover{background:var(--bg2)}
.week-row.expanded{background:var(--bg2);border-color:var(--accent)}
.wr-date{font-family:var(--font-mono);font-size:13px;color:var(--fg2);width:200px;flex-shrink:0}
.wr-bar{flex:1;height:8px;border-radius:4px;background:var(--bg3);overflow:hidden;max-width:300px}
.wr-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .3s}
.wr-count{font-family:var(--font-mono);font-size:13px;color:var(--fg3);width:80px;text-align:right;flex-shrink:0}
.wr-toggle{font-size:12px;color:var(--accent);font-weight:500;width:60px;text-align:right;flex-shrink:0}

/* Expanded week detail */
.week-detail{display:none;padding:0 16px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.week-detail.show{display:block}
.week-detail .loading{text-align:center;padding:20px;font-size:13px;color:var(--fg3)}
.wd-paper{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.wd-paper:last-child{border-bottom:none}
.wd-score{font-family:var(--font-mono);font-size:12px;font-weight:500;width:28px;text-align:center;flex-shrink:0}
.wd-score.core{color:var(--accent)}.wd-score.high{color:var(--accent2)}.wd-score.medium{color:var(--accent3)}
.wd-title{font-size:13px;flex:1;line-height:1.4}
.wd-title a{color:var(--fg)}.wd-title a:hover{color:var(--accent)}
.wd-date{font-family:var(--font-mono);font-size:11px;color:var(--fg3);flex-shrink:0}
.wd-links{flex-shrink:0;display:flex;gap:6px}
.wd-links a{font-size:11px;color:var(--accent);font-weight:500}.wd-links a:hover{text-decoration:underline}

.empty{text-align:center;padding:60px 20px;color:var(--fg3);font-size:14px}
.site-footer{padding:24px 0;border-top:1px solid var(--border);font-size:12px;color:var(--fg3);text-align:center}
@media(max-width:640px){.nav-links{display:none}.wr-bar{display:none}.wr-date{width:auto}}
</style>
</head>
<body>
<div class="page">
  <nav class="nav">
    <a href="../index.html" class="nav-brand">
      <div class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 12 7 12 9 6 12 18 15 9 17 12 21 12"/></svg></div>
      <span class="nav-title">rPPG Hub</span>
    </a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="rppg_datasets_dashboard.html" class="nav-link">Datasets</a>
      <a href="recent_papers.html" class="nav-link">Recent 90 days</a>
      <a href="paper_archive.html" class="nav-link active">Archive</a>
    </div>
  </nav>
  <header class="page-header">
    <h1>Paper archive</h1>
    <p>All weekly collections of rPPG-relevant papers. Click a week to expand and browse papers.</p>
  </header>
  <main class="content" id="content"></main>
  <footer class="site-footer">rPPG Research Hub — auto-updated weekly via GitHub Actions</footer>
</div>
<script>
const weekCache = {};

async function loadWeekDetail(weekEnd, container) {
  if (weekCache[weekEnd]) { renderDetail(weekCache[weekEnd], container); return; }
  container.innerHTML = '<div class="loading">Loading papers…</div>';
  try {
    const r = await fetch(`../data/archive/${weekEnd}.json`);
    if (!r.ok) throw 0;
    const data = await r.json();
    weekCache[weekEnd] = data;
    renderDetail(data, container);
  } catch (e) {
    container.innerHTML = '<div class="loading">Failed to load papers.</div>';
  }
}

function renderDetail(data, container) {
  const papers = data.papers || [];
  if (!papers.length) { container.innerHTML = '<div class="loading">No papers this week.</div>'; return; }
  container.innerHTML = papers.map(p => {
    const tier = p.relevance_tier || 'low';
    return `<div class="wd-paper">
      <div class="wd-score ${tier}">${p.relevance_score}</div>
      <div class="wd-title"><a href="${p.url}" target="_blank">${p.title}</a></div>
      <div class="wd-date">${p.date || ''}</div>
      <div class="wd-links"><a href="${p.url}" target="_blank">abs</a><a href="${p.pdf_url}" target="_blank">pdf</a></div>
    </div>`;
  }).join('');
}

function toggleWeek(weekEnd, rowEl) {
  const detail = rowEl.nextElementSibling;
  const isOpen = detail.classList.contains('show');

  // Close all
  document.querySelectorAll('.week-detail.show').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.week-row.expanded').forEach(r => r.classList.remove('expanded'));

  if (!isOpen) {
    detail.classList.add('show');
    rowEl.classList.add('expanded');
    loadWeekDetail(weekEnd, detail);
  }
}

async function init() {
  const el = document.getElementById('content');
  let index;
  try { const r = await fetch('../data/archive_index.json'); if (!r.ok) throw 0; index = await r.json(); }
  catch (e) { el.innerHTML = '<div class="empty">No archive data yet. Run the weekly GitHub Action first.</div>'; return; }

  const weeks = index.weeks || [];
  if (!weeks.length) { el.innerHTML = '<div class="empty">No archived weeks found.</div>'; return; }

  const maxPapers = Math.max(...weeks.map(w => w.paper_count || 0), 1);

  el.innerHTML = `<div class="week-list">${weeks.map(w => {
    const pct = Math.round(((w.paper_count || 0) / maxPapers) * 100);
    const label = w.week_start ? `${w.week_start} → ${w.week_end}` : w.week_end;
    return `<div class="week-row" onclick="toggleWeek('${w.week_end}', this)">
      <div class="wr-date">${label}</div>
      <div class="wr-bar"><div class="wr-bar-fill" style="width:${pct}%"></div></div>
      <div class="wr-count">${w.paper_count} papers</div>
      <div class="wr-toggle">expand</div>
    </div>
    <div class="week-detail"></div>`;
  }).join('')}</div>`;
}
init();
</script>
</body>
</html>
