<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rPPG Research Hub</title>
<link rel="icon" href="https://github.com/infraface/infraface.github.io/blob/main/asset/profile.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--bg:#FAFAF7;--bg2:#F0EFE9;--bg3:#E6E5DF;--fg:#1C1C1A;--fg2:#6B6A65;--fg3:#9E9D97;--border:#D8D7D1;--accent:#2563EB;--accent-bg:#EFF6FF;--accent2:#0D9488;--accent2-bg:#F0FDFA;--accent3:#D97706;--accent3-bg:#FFFBEB;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){:root{--bg:#141413;--bg2:#1E1E1C;--bg3:#2A2A27;--fg:#EEEEE8;--fg2:#A3A29C;--fg3:#6B6A65;--border:#3A3A36;--accent:#60A5FA;--accent-bg:#1E293B;--accent2:#2DD4BF;--accent2-bg:#134E4A;--accent3:#FBBF24;--accent3-bg:#422006;--shadow:0 1px 3px rgba(0,0,0,.3)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.page{max-width:1280px;margin:0 auto;padding:0 2rem}
.nav{padding:18px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.nav-brand{display:flex;align-items:center;gap:10px}.nav-logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}.nav-logo svg{width:18px;height:18px}.nav-title{font-weight:600;font-size:16px;letter-spacing:-.3px}.nav-links{display:flex;gap:6px}.nav-link{font-size:13px;padding:6px 14px;border-radius:20px;color:var(--fg2);transition:all .2s}.nav-link:hover{background:var(--bg2);color:var(--fg)}.nav-link.active{background:var(--fg);color:var(--bg)}
.site-intro{padding:32px 0 0;text-align:center}
.site-intro .badge{font-size:12px;font-weight:500;color:var(--accent);background:var(--accent-bg);display:inline-block;padding:5px 14px;border-radius:20px;letter-spacing:.3px;margin-bottom:16px}
.site-intro p{font-size:15px;color:var(--fg2);max-width:520px;margin:0 auto}
.page-header{padding:28px 0 20px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--border)}
.page-header-left .label{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:4px}
.page-header-left h1{font-size:24px;font-weight:600;letter-spacing:-.5px}
.page-header-left p{font-size:14px;color:var(--fg2);margin-top:2px}
.link-arrow{font-size:13px;color:var(--accent);font-weight:500;display:inline-flex;align-items:center;gap:4px;transition:gap .2s}.link-arrow:hover{gap:8px}.link-arrow svg{width:14px;height:14px}
.papers-section{padding:20px 0 48px}
.papers-date-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.papers-date{font-family:var(--font-mono);font-size:13px;background:var(--bg2);padding:5px 14px;border-radius:20px;color:var(--fg2);border:1px solid var(--border)}
.papers-count{font-size:13px;color:var(--fg3)}
.papers-live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--accent2)}
.papers-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tier-legend{display:flex;gap:16px;margin-bottom:16px;font-size:12px;color:var(--fg3);flex-wrap:wrap}.tier-legend-item{display:flex;align-items:center;gap:5px}.tier-dot{width:8px;height:8px;border-radius:50%}
.paper-list{display:flex;flex-direction:column;gap:10px}
.paper-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:all .2s}
.paper-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.paper-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px}
.paper-title{font-size:15px;font-weight:500;line-height:1.4;flex:1}.paper-title a{color:var(--accent)}.paper-title a:hover{text-decoration:underline}
.paper-score{flex-shrink:0;display:flex;align-items:center;gap:6px}
.score-bar{width:48px;height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}.score-fill{height:100%;border-radius:3px;transition:width .4s ease}
.score-num{font-family:var(--font-mono);font-size:12px;font-weight:500;min-width:24px;text-align:right}
.paper-meta{font-size:12px;color:var(--fg3);margin-bottom:6px}
.paper-abstract{font-size:13px;color:var(--fg2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.paper-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.kw-tag{font-size:10px;padding:2px 8px;border-radius:12px;background:var(--accent-bg);color:var(--accent);font-weight:500}
.tier-core .score-fill{background:var(--accent)}.tier-high .score-fill{background:var(--accent2)}.tier-medium .score-fill{background:var(--accent3)}.tier-low .score-fill{background:var(--fg3)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--fg);transition:all .2s}.btn:hover{background:var(--bg3);transform:translateY(-1px)}.btn svg{width:14px;height:14px;flex-shrink:0}
.papers-empty{text-align:center;padding:48px 20px;color:var(--fg3)}.papers-empty p{font-size:14px}
.site-footer{padding:24px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.site-footer p{font-size:12px;color:var(--fg3)}.footer-links{display:flex;gap:16px}.footer-links a{font-size:12px;color:var(--fg3);transition:color .2s}.footer-links a:hover{color:var(--fg)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.anim{animation:fadeUp .5s ease both}.d1{animation-delay:.06s}.d2{animation-delay:.12s}
@media(max-width:640px){.nav-links{display:none}.page-header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="page">
  <nav class="nav" id="nav"></nav>
  <div class="site-intro anim">
    <div style="font-size:clamp(32px,5vw,48px);font-weight:600;letter-spacing:-1.5px;line-height:1.1;color:var(--accent);margin-bottom:12px">Remote Photoplethysmography</div>
    <p>A curated collection of papers, datasets, and resources for Remote Photoplethysmography (rPPG).</p>
  </div>
  <header class="page-header anim" id="pageHeader"></header>
  <main class="papers-section anim d1" id="weeklyPapers"></main>
  <footer class="site-footer anim d2" id="footer"></footer>
</div>
<script>
const SITE = { title: "rPPG Hub" };
const NAV_LINKS = [
  { label: "Home", href: "index.html", active: true },
  { label: "Datasets", href: "pages/rppg_datasets_dashboard.html" },
  { label: "Recent 90 days", href: "pages/recent_papers.html" },
  { label: "Archive", href: "pages/paper_archive.html" },
];
const FOOTER = {
  copyright: "rPPG Research Hub — compiled for the research community",
  links: [
    { label: "GitHub", href: "https://github.com/infraface/rPPG" },
    { label: "arXiv", href: "https://arxiv.org/" },
  ],
};

const IC = {
  pulse: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 12 7 12 9 6 12 18 15 9 17 12 21 12"/></svg>',
  arrowR: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
};

document.getElementById('nav').innerHTML = `
  <a href="index.html" class="nav-brand"><div class="nav-logo">${IC.pulse}</div><span class="nav-title">${SITE.title}</span></a>
  <div class="nav-links">${NAV_LINKS.map(l => `<a href="${l.href}" class="nav-link${l.active ? ' active' : ''}">${l.label}</a>`).join('')}</div>`;

document.getElementById('pageHeader').innerHTML = `
  <div class="page-header-left">
    <div class="label">Weekly papers</div>
    <h1>This week's rPPG-relevant papers</h1>
    <p>From arXiv cs.CV and cs.AI — updated every Friday.</p>
  </div>
  <a href="pages/recent_papers.html" class="link-arrow">Recent 90 days ${IC.arrowR}</a>`;

document.getElementById('footer').innerHTML = `
  <p>${FOOTER.copyright}</p>
  <div class="footer-links">${FOOTER.links.map(l => `<a href="${l.href}" target="_blank">${l.label}</a>`).join('')}</div>`;

function renderCard(p) {
  const pct = Math.min(100, p.relevance_score || 0), tier = p.relevance_tier || 'low';
  const kws = (p.matched_keywords || []).slice(0, 5);
  const allAuthors = p.authors || [];
  const authors = allAuthors.length > 10 ? allAuthors.slice(0, 10).join(', ') + ', et al.' : allAuthors.join(', ');
  const cats = (p.categories || []).join(', ');
  const date = p.date ? `<span style="font-family:var(--font-mono)">${p.date}</span> · ` : '';
  return `<div class="paper-card tier-${tier}">
    <div class="paper-top">
      <div class="paper-title"><a href="${p.url}" target="_blank">${p.title}</a></div>
      <div class="paper-score"><div class="score-bar"><div class="score-fill" style="width:${pct}%"></div></div><span class="score-num">${p.relevance_score}</span></div>
    </div>
    <div class="paper-meta">${date}${authors}${cats ? ' · ' + cats : ''} · <a href="${p.pdf_url}" target="_blank" style="color:var(--accent)">PDF</a></div>
    <div class="paper-abstract">${p.abstract || ''}</div>
    ${kws.length ? `<div class="paper-tags">${kws.map(k => `<span class="kw-tag">${k}</span>`).join('')}</div>` : ''}
  </div>`;
}

async function loadPapers() {
  const el = document.getElementById('weeklyPapers');
  let data;
  try { const r = await fetch('data/weekly_papers.json'); if (!r.ok) throw 0; data = await r.json(); }
  catch (e) { el.innerHTML = `<div class="papers-empty"><p>No paper data yet. Run <code style="font-family:var(--font-mono);background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:12px">python fetch_papers.py</code> or trigger the GitHub Action.</p></div>`; return; }

  const papers = data.papers || [];
  const ws = data.week_start || '', we = data.week_end || '';

  el.innerHTML = `
    <div class="papers-date-bar">
      <span class="papers-date">${ws} → ${we}</span>
      <span class="papers-count">${papers.length} paper${papers.length !== 1 ? 's' : ''}</span>
      <span class="papers-live">Updated every Friday</span>
    </div>
    <div class="tier-legend">
      <div class="tier-legend-item"><div class="tier-dot" style="background:var(--accent)"></div> Core (≥60)</div>
      <div class="tier-legend-item"><div class="tier-dot" style="background:var(--accent2)"></div> High (≥30)</div>
      <div class="tier-legend-item"><div class="tier-dot" style="background:var(--accent3)"></div> Medium (≥12)</div>
    </div>
    <div class="paper-list">${papers.length ? papers.map(renderCard).join('') : '<div class="papers-empty"><p>No relevant papers this week. Check back next Friday!</p></div>'}</div>
    `;
}
loadPapers();
</script>
</body>
</html>
